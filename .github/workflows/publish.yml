name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC trusted publishing — no token required
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Verify tag matches package version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag_version="${REF_NAME#v}"
          pkg_version=$(python3 -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $REF_NAME does not match pyproject.toml version $pkg_version" >&2
            exit 1
          fi
          echo "Tag $REF_NAME matches package version $pkg_version"

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
