name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install "$UV_PYTHON"

      - name: Install project
        run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run --all-extras ruff check .

      - name: Ruff (format check)
        run: uv run --all-extras ruff format --check .

      - name: Mypy
        run: uv run --all-extras mypy

      - name: Pytest
        run: uv run --all-extras pytest

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install "$UV_PYTHON"

      - name: Install project
        run: uv sync --all-extras

      - name: pip-audit
        run: |
          uv export --no-emit-project --format requirements-txt > /tmp/requirements.txt
          uv run --all-extras pip-audit --strict --requirement /tmp/requirements.txt
